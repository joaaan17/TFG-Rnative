services:
  - type: web
    name: tfg-api
    runtime: node
    buildCommand: npm install
    startCommand: npm run start:server
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_DB_URI
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
